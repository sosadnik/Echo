services:
  echo:
    build: .
    ports:
      - "127.0.0.1:8765:8765"
    volumes:
      - .:/app
      - echo-data:/data
    env_file:
      - path: .env
        required: false
    environment:
      ECHO_HOST: 0.0.0.0
      ECHO_WHISPER_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["uvicorn", "echo_app.app:create_app", "--factory", "--host", "0.0.0.0", "--port", "8765"]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3

  gpu-preflight:
    profiles: ["tools"]
    build: .
    volumes:
      - echo-data:/data
    environment:
      ECHO_WHISPER_DEVICE: cuda
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: ["python3", "scripts/preflight_gpu.py", "--models-dir", "/data/echo/models"]

volumes:
  echo-data:
